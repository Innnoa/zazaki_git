# zazaki_git default configuration

[keybindings]
quit = "q"
help = "?"
refresh = "Ctrl+R"
tab_status = "1"
tab_staging = "2"
tab_branches = "3"
tab_log = "4"
tab_stash = "5"
tab_remote = "6"
stage = "Space"
stage_all = "a"
unstage = "u"
commit = "c"
move_up = "k"
move_down = "j"
confirm = "Enter"
diff = "d"
new_branch = "n"
delete_branch = "D"
switch_branch = "Enter"
merge_branch = "m"
push = "p"
fetch = "f"
pull = "P"
stash_save = "s"
stash_pop = "g"
stash_drop = "X"
toggle_panel = "Tab"
back = "Escape"
scroll_up = "Up"
scroll_down = "Down"

[colors]
staged = "Green"
unstaged = "Yellow"
untracked = "Red"
diff_add = "Green"
diff_delete = "Red"
diff_header = "Cyan"
branch_current = "Green"
branch_local = "White"
selected = "Cyan"
normal = "White"
dim = "GrayDark"
warn = "Yellow"
error = "Red"

[ui]
sidebar_width = "20"
show_line_numbers = "false"
